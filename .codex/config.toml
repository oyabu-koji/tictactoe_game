developer_instructions = """
サブエージェントとしてレビューや検証を行う場合は、役割に応じて次の role ファイルを参照すること。
- `doc_reviewer` を使うときは `.agents/agents/doc-reviewer.md`
- `implementation_validator` を使うときは `.agents/agents/implementation-validator.md`
ドキュメントレビュー時は `doc_reviewer` を必ず使用すること。
実装検証時は `implementation_validator` を必ず使用すること。
ドキュメントレビューと実装検証の両方が必要な場合は、両方のサブエージェントを使用して結果を統合すること。
サブエージェントを使わずにレビューや検証タスクを完了してはならない。
レビュー結果や検証結果は日本語で簡潔にまとめ、必要に応じて `docs/` や `.steering/` の関連ファイルも確認すること。
"""

[features]
multi_agent = true

[agents.doc_reviewer]
description = "ドキュメントレビュー用のサブエージェント。`.agents/agents/doc-reviewer.md` を参照する。"
instructions = """
ドキュメント品質レビューを担当する。
次の条件に該当する場合はこのエージェントを使用する。
- `docs/` 配下のファイルレビュー
- PRD / 設計書 / アーキテクチャドキュメントのレビュー
- ドキュメント品質改善
- スペックレビュー
使用前に `.agents/agents/doc-reviewer.md` を必ず読むこと。
`docs/` 配下の文書を完全性・明確性・一貫性の観点で日本語レビューする。
"""

[agents.implementation_validator]
description = "実装コードの品質とスペック整合性を検証するサブエージェント。`.agents/agents/implementation-validator.md` を参照する。"
instructions = """
実装コードの品質とスペック整合性の検証を担当する。
次の条件に該当する場合はこのエージェントを使用する。
- `src/` 配下のコードレビュー
- 実装コードの品質検証
- スペックとの整合性確認
- React Native / Expo 実装チェック
- テスト・セキュリティ・パフォーマンス検証
使用前に `.agents/agents/implementation-validator.md` を必ず読むこと。
仕様整合性・コード品質・テスト・セキュリティ・パフォーマンス・React Native / Expo 固有品質を日本語で検証する。
"""
